<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — AmaemonVPN</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <div class="logo">AmaemonVPN</div>
  <div class="nav-links">
    <a href="/">← На главную</a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <h2>Добро пожаловать</h2>
    <p>Войдите в личный кабинет</p>

    <div id="error-msg" style="display:none; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; padding: 0.6rem 0.9rem; border-radius: 8px; font-size: 13px; margin-bottom: 1rem;"></div>

    <div id="verify-msg" style="display:none; background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); color: #f59e0b; padding: 0.6rem 0.9rem; border-radius: 8px; font-size: 13px; margin-bottom: 1rem;">
      Email не подтверждён. <a id="resend-link" href="#" onclick="resend(event)" style="color:#f59e0b; font-weight:600;">Отправить письмо повторно</a>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>

    <button class="btn btn-full" id="btn-login" onclick="login()">Войти</button>

    <div class="auth-footer">
      Нет аккаунта? <a href="/register">Зарегистрироваться</a>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('token')) window.location.href = '/cabinet';

  let unverifiedEmail = '';

  async function login() {
    const btn = document.getElementById('btn-login');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    hideMessages();
    if (!email || !password) return showError('Введите email и пароль');

    btn.disabled = true;
    btn.textContent = 'Входим...';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (res.status === 403 && data.error === 'email_not_verified') {
        unverifiedEmail = data.email || email;
        document.getElementById('verify-msg').style.display = 'block';
        return;
      }

      if (!res.ok) return showError(data.error || 'Ошибка');

      localStorage.setItem('token', data.token);
      window.location.href = '/cabinet';
    } catch {
      showError('Ошибка соединения с сервером');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Войти';
    }
  }

  async function resend(e) {
    e.preventDefault();
    const link = document.getElementById('resend-link');
    link.textContent = 'Отправляем...';
    try {
      await fetch('/api/resend-verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: unverifiedEmail })
      });
      link.textContent = 'Письмо отправлено ✓';
    } catch {
      link.textContent = 'Ошибка, попробуйте снова';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('btn-login').disabled = false;
    document.getElementById('btn-login').textContent = 'Войти';
  }

  function hideMessages() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('verify-msg').style.display = 'none';
  }
</script>

</body>
</html>
