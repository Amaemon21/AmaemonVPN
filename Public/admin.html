<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ — HappVPN</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <style>
    .admin-wrap { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
    .admin-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .admin-header h2 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.3rem; }
    .stat-card .num { font-family: var(--font-display); font-size: 2.2rem; font-weight: 800; letter-spacing: -0.03em; }
    .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); padding: 0.65rem 0.9rem; border-bottom: 1px solid var(--border); }
    td { padding: 0.8rem 0.9rem; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    .user-row td { border-bottom: none; }
    .extend-btn { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); border-radius: 7px; padding: 0.25rem 0.75rem; font-size: 12px; cursor: pointer; white-space: nowrap; font-family: var(--font); }
    .extend-btn:hover { background: rgba(0,212,255,0.18); }
    .delete-btn { background: rgba(255,71,87,0.1); color: var(--red); border: 1px solid rgba(255,71,87,0.2); border-radius: 7px; padding: 0.25rem 0.75rem; font-size: 12px; cursor: pointer; white-space: nowrap; margin-left: 0.4rem; font-family: var(--font); }
    .delete-btn:hover { background: rgba(255,71,87,0.2); }
    .expand-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 0.1rem 0.4rem; border-radius: 4px; transition: color 0.2s; }
    .expand-btn:hover { color: var(--text); }
    .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; overflow-x: auto; }
    .time-left { font-family: monospace; font-size: 12px; }
    .time-left.expired { color: var(--red); }
    .time-left.active { color: var(--accent); }
    .online-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--muted); margin-right: 5px; }
    .online-dot.online { background: var(--green); box-shadow: 0 0 5px var(--green); }

    .search-bar { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 1rem; }
    .search-input-wrap { position: relative; flex: 1; max-width: 440px; }
    .search-input-wrap svg { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
    .search-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 9px; padding: 0.5rem 0.9rem 0.5rem 2.3rem; font-size: 13px; font-family: var(--font); color: var(--text); outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .search-clear { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 0.3rem 0.6rem; border-radius: 6px; transition: color 0.2s; display: none; font-family: var(--font); }
    .search-clear:hover { color: var(--text); }
    .search-count { font-size: 12px; color: var(--muted); }
    mark { background: rgba(0,212,255,0.2); color: var(--text); border-radius: 2px; padding: 0 1px; }

    .devices-row { display: none; }
    .devices-row.open { display: table-row; }
    .devices-row td { background: var(--bg3); padding: 0 0 0 2.2rem; border-bottom: 1px solid var(--border); }
    .devices-subtable { width: 100%; border-collapse: collapse; margin: 0.5rem 0; }
    .devices-subtable td { padding: 0.4rem 0.7rem; font-size: 12px; border: none; color: var(--muted2); }
    .devices-subtable td:first-child { color: var(--text); font-weight: 500; }
    .uuid-cell { font-family: monospace; font-size: 11px; color: var(--muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    @media (max-width: 768px) {
      th:nth-child(5), td:nth-child(5),
      th:nth-child(6), td:nth-child(6),
      th:nth-child(7), td:nth-child(7) { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo"><span class="logo-dot"></span>HappVPN</div>
  <div class="nav-links">
    <a href="/cabinet">Кабинет</a>
    <button class="btn-outline" style="font-size:13px; padding:0.4rem 1rem;" onclick="logout()">Выйти</button>
  </div>
</nav>

<div class="admin-wrap">
  <div class="admin-header">
    <h2>Панель администратора</h2>
    <button class="btn" onclick="loadAll()" style="font-size: 13px; padding: 0.45rem 1.1rem;">↺ Обновить</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="stat-total">—</div>
      <div class="lbl">Всего пользователей</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-active" style="color: var(--green)">—</div>
      <div class="lbl">Активных</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-expired" style="color: var(--red)">—</div>
      <div class="lbl">Истекших</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-xray" style="color: var(--accent)">—</div>
      <div class="lbl">Клиентов в Xray</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-devices">—</div>
      <div class="lbl">Всего устройств</div>
    </div>
  </div>

  <div class="search-bar">
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="search-input" type="text"
        placeholder="Поиск по имени или email..."
        oninput="onSearch(this.value)">
    </div>
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕ Сбросить</button>
    <span class="search-count" id="search-count"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th></th>
          <th>ФИО</th>
          <th>Email</th>
          <th>Устр.</th>
          <th>Зарегистрирован</th>
          <th>Истекает</th>
          <th>Осталось</th>
          <th>Действие</th>
        </tr>
      </thead>
      <tbody id="users-tbody">
        <tr><td colspan="8" style="text-align:center; color:var(--muted); padding: 2rem;">Загрузка...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/login';

  let usersData = [];
  let statsData = {};
  let tickInterval;
  let searchQuery = '';

  async function loadAll() {
    await Promise.all([loadUsers(), loadStats()]);
    renderTable();
    renderStats();
    startTick();
  }

  async function loadUsers() {
    try {
      const res = await fetch('/api/admin/users', { headers: { 'Authorization': 'Bearer ' + token } });
      if (res.status === 401) { logout(); return; }
      if (res.status === 403) {
        document.getElementById('users-tbody').innerHTML =
          '<tr><td colspan="8" style="text-align:center;color:var(--red);padding:2rem;">Нет доступа</td></tr>';
        return;
      }
      usersData = await res.json();
    } catch {
      document.getElementById('users-tbody').innerHTML =
        '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:2rem;">Ошибка загрузки</td></tr>';
    }
  }

  async function loadStats() {
    try {
      const res = await fetch('/api/admin/stats', { headers: { 'Authorization': 'Bearer ' + token } });
      if (res.ok) statsData = await res.json();
    } catch {}
  }

  function renderStats() {
    const now = Math.floor(Date.now() / 1000);
    const active = usersData.filter(u => u.subscription_ends > now).length;
    const totalDevices = usersData.reduce((s, u) => s + (u.devices?.length || 0), 0);
    document.getElementById('stat-total').textContent = usersData.length;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-expired').textContent = usersData.length - active;
    document.getElementById('stat-xray').textContent = statsData.xray_active ?? '—';
    document.getElementById('stat-devices').textContent = totalDevices;
  }

  function onSearch(val) {
    searchQuery = val.trim().toLowerCase();
    document.getElementById('search-clear').style.display = searchQuery ? 'inline-block' : 'none';
    renderTable();
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    onSearch('');
    document.getElementById('search-input').focus();
  }

  function highlight(str, query) {
    if (!query) return esc(str);
    const escaped = esc(str);
    const escapedQ = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escaped.replace(new RegExp('(' + escapedQ + ')', 'gi'), '<mark>$1</mark>');
  }

  function filterUsers() {
    if (!searchQuery) return usersData;
    return usersData.filter(u =>
      u.full_name.toLowerCase().includes(searchQuery) ||
      u.email.toLowerCase().includes(searchQuery)
    );
  }

  function renderTable() {
    const now = Math.floor(Date.now() / 1000);
    const tbody = document.getElementById('users-tbody');
    const filtered = filterUsers();

    const countEl = document.getElementById('search-count');
    countEl.textContent = searchQuery ? `Найдено: ${filtered.length} из ${usersData.length}` : '';

    if (!usersData.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:2rem;">Нет пользователей</td></tr>';
      return;
    }
    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:2rem;">Ничего не найдено</td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map(u => {
      const active = u.subscription_ends > now;
      const devices = u.devices || [];

      const devicesHtml = devices.map(d => {
        const identifier = d.protocol === 'amnezia' ? (d.client_name || '—') : (d.uuid || '—');
        const protoLabel = d.protocol === 'amnezia'
          ? '<span style="color:#7b61ff;font-size:10px">AmneziaWG</span>'
          : '<span style="color:var(--accent);font-size:10px">VLESS</span>';

        // Онлайн для WG — ищем по vpn_ip в wg_peers
        let onlineHtml = '';
        if (d.protocol === 'amnezia' && d.vpn_ip && statsData.wg_peers) {
          const peer = Object.values(statsData.wg_peers).find(p => p.allowedIps === d.vpn_ip + '/32');
          const online = peer && peer.latestHandshake && (now - peer.latestHandshake) < 180;
          onlineHtml = online
            ? '<span style="color:var(--green)">● онлайн</span>'
            : '<span style="color:var(--muted)">○ офлайн</span>';
        } else if (d.protocol === 'vless') {
          onlineHtml = '<span style="color:var(--muted)">—</span>';
        }

        return `
          <tr>
            <td>${esc(d.name)} ${protoLabel}</td>
            <td class="uuid-cell">${esc(identifier)}</td>
            <td>${onlineHtml}</td>
            <td>${d.paused ? '<span style="color:var(--red)">пауза</span>' : '<span style="color:var(--green)">активно</span>'}</td>
          </tr>
        `;
      }).join('');

      return `
        <tr class="user-row" id="user-row-${u.id}">
          <td>
            <button class="expand-btn" onclick="toggleDevices(${u.id})" id="expand-${u.id}">▶</button>
          </td>
          <td>${highlight(u.full_name, searchQuery)}</td>
          <td style="color:var(--muted2)">${highlight(u.email, searchQuery)}</td>
          <td style="text-align:center">${devices.length}</td>
          <td style="color:var(--muted2)">${formatDate(u.created_at)}</td>
          <td style="color:var(--muted2)">${formatDateTime(u.subscription_ends)}</td>
          <td><span class="time-left ${active ? 'active' : 'expired'}" id="tl-${u.id}">${timeLeft(u.subscription_ends)}</span></td>
          <td style="white-space:nowrap">
            <select id="sel-${u.id}" style="background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:0.2rem 0.5rem;font-size:12px;font-family:var(--font);margin-right:0.4rem;">
              <option value="1">+1ч</option>
              <option value="24">+1д</option>
              <option value="168">+7д</option>
              <option value="720" selected>+30д</option>
              <option value="2160">+90д</option>
            </select>
            <button class="extend-btn" onclick="extend(${u.id})">Продлить</button>
            <button class="delete-btn" onclick="deleteUser(${u.id}, '${esc(u.email)}')">Удалить</button>
          </td>
        </tr>
        <tr class="devices-row" id="devices-row-${u.id}">
          <td colspan="8">
            <table class="devices-subtable">
              <thead>
                <tr>
                  <td><strong>Устройство</strong></td>
                  <td><strong>ID / Имя клиента</strong></td>
                  <td><strong>Онлайн</strong></td>
                  <td><strong>Статус</strong></td>
                </tr>
              </thead>
              <tbody>${devicesHtml || '<tr><td colspan="4" style="color:var(--muted)">Нет устройств</td></tr>'}</tbody>
            </table>
          </td>
        </tr>
      `;
    }).join('');
  }

  function toggleDevices(userId) {
    const row = document.getElementById('devices-row-' + userId);
    const btn = document.getElementById('expand-' + userId);
    const isOpen = row.classList.contains('open');
    row.classList.toggle('open', !isOpen);
    btn.textContent = isOpen ? '▶' : '▼';
  }

  function startTick() {
    if (tickInterval) clearInterval(tickInterval);
    tickInterval = setInterval(() => {
      filterUsers().forEach(u => {
        const el = document.getElementById('tl-' + u.id);
        if (!el) return;
        const active = u.subscription_ends > Math.floor(Date.now() / 1000);
        el.textContent = timeLeft(u.subscription_ends);
        el.className = 'time-left ' + (active ? 'active' : 'expired');
      });
      renderStats();
    }, 1000);

    setInterval(async () => {
      await loadStats();
      renderStats();
    }, 30000);
  }

  async function extend(userId) {
    const sel = document.getElementById('sel-' + userId);
    const hours = parseInt(sel.value);
    try {
      const res = await fetch('/api/admin/extend/' + userId, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ hours })
      });
      const data = await res.json();
      if (data.success) {
        const user = usersData.find(u => u.id === userId);
        if (user) user.subscription_ends = data.subscription_ends;
        renderTable(); startTick(); renderStats();
      }
    } catch { alert('Ошибка'); }
  }

  async function deleteUser(userId, email) {
    if (!confirm(`Удалить пользователя ${email}?\n\nЭто удалит аккаунт, все устройства и отзовёт доступ к VPN.`)) return;
    try {
      const res = await fetch('/api/admin/users/' + userId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      if (data.success) {
        usersData = usersData.filter(u => u.id !== userId);
        renderTable(); renderStats();
      } else {
        alert('Ошибка: ' + (data.error || ''));
      }
    } catch { alert('Ошибка соединения'); }
  }

  function timeLeft(unix) {
    const diff = unix * 1000 - Date.now();
    if (diff <= 0) return 'истекла';
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    if (h >= 24) return `${Math.floor(h / 24)}д ${h % 24}ч`;
    if (h > 0) return `${h}ч ${pad(m)}м ${pad(s)}с`;
    return `${pad(m)}м ${pad(s)}с`;
  }

  function pad(n) { return String(n).padStart(2, '0'); }
  function formatDate(unix) { return new Date(unix * 1000).toLocaleDateString('ru-RU'); }
  function formatDateTime(unix) {
    return new Date(unix * 1000).toLocaleString('ru-RU', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function logout() { localStorage.removeItem('token'); window.location.href = '/'; }

  loadAll();
</script>
</body>
</html>
